apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dnf-mysql-new
  namespace: dnf-server
spec:
  selector:
    matchLabels:
      app: dnf-mysql-new
      app.kubernetes.io/name: dnf-mysql-new
  template:
    metadata:
      labels:
        app: dnf-mysql-new
        app.kubernetes.io/name: dnf-mysql-new
    spec:
      containers:
        - name: dnf-mysql-new
          image: llnut/dnf:debian13-db-latest
          # 建议设置 resources.limits.memory，否则 my.cnf 会按宿主机内存选择性能配置
          # resources:
          #   requests:
          #     memory: "2Gi"
          #     cpu: "1"
          #   limits:
          #     memory: "2Gi"
          #     cpu: "1"
          env:
            - name: DNF_DB_ROOT_PASSWORD
              value: "88888888"
            - name: TZ
              value: "Asia/Shanghai"
            # - name: TUNE_PROFILE
            #   value: "nano"
          ports:
            - name: mysql
              containerPort: 4000
          volumeMounts:
            - name: mysql-persistent-storage-new
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-persistent-storage-new
  volumeClaimTemplates:
    - metadata:
        name: mysql-persistent-storage-new
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
        storageClassName: nfs-client
---
apiVersion: v1
kind: Service
metadata:
  name: dnf-mysql-server-new
  labels:
    app: dnf-mysql-server-new
    app.kubernetes.io/name: dnf-mysql-server-new
  namespace: dnf-server
spec:
  ports:
    - name: dnf-mysql-server-new-port
      port: 4000
      targetPort: 4000
  selector:
    app: dnf-mysql-new
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: ext-dnf-mysql-server-new
  labels:
    app: ext-dnf-mysql-server-new
    app.kubernetes.io/name: ext-dnf-mysql-server-new
  namespace: dnf-server
spec:
  ports:
    - name: ext-dnf-mysql-server-new-port
      port: 4000
      targetPort: 4000
      nodePort: 30400
  selector:
    app: dnf-mysql-new
  type: NodePort


