apiVersion: v1
kind: Service
metadata:
  name: dnf-new-service-tcp
  namespace: dnf-server
spec:
  selector:
    app: dnf-server-new
  ports:
    - name: tcp-180
      port: 180
      targetPort: 180
      protocol: TCP
    - name: tcp-5505
      port: 5505
      targetPort: 5505
      nodePort: 30505
      protocol: TCP
    - name: tcp-7001
      port: 7001
      targetPort: 7001
      protocol: TCP
    - name: tcp-7200
      port: 7200
      targetPort: 7200
      protocol: TCP
    - name: tcp-10011
      port: 10011
      targetPort: 10011
      protocol: TCP
    - name: tcp-10052
      port: 10052
      targetPort: 10052
      protocol: TCP

  type: NodePort