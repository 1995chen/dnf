version: "2.3"

services:

  mysql:
      image: llnut/dnf:debian13-db-latest
      mem_limit: 1g
      environment:
        - DNF_DB_ROOT_PASSWORD=88888888
        - TZ=Asia/Shanghai
      ports:
        - "3001:4000"
      volumes:
        - ./mysql:/var/lib/mysql
      restart: always

  dnf-1:
    hostname: dnf-1
    image: llnut/dnf:debian13-server-qf1031-latest
    environment:
      - TZ=Asia/Shanghai
      - SERVER_GROUP=1
      # 仅开启11和52频道
      - OPEN_CHANNEL='11,52'
      # 手动指定对外IP
      - PUBLIC_IP=IP-1
      - MAIN_MYSQL_HOST=IP-1
      - MAIN_MYSQL_PORT=3001
      - MAIN_MYSQL_ROOT_PASSWORD=88888888
      # - MAIN_MYSQL_GAME_ALLOW_IP=%
      - MYSQL_HOST=IP-1
      # 远程mysql的端口号[这里以3001为例]
      - MYSQL_PORT=3001
      # 远程数据库root密码
      - DNF_DB_ROOT_PASSWORD=88888888
      # - MYSQL_GAME_ALLOW_IP=%
      # dnf-gate-server配置（主节点，对外暴露登录服务）
      - GATE_AES_KEY=a1b2c3d4e5f6789012345678901234567890abcdef0123456789abcdef012345
      # TLS配置（可选，GATE_TLS_CERT_PATH与GATE_TLS_KEY_PATH同时设置时启用）
      # - GATE_TLS_CERT_PATH=/data/server.crt
      # - GATE_TLS_KEY_PATH=/data/server.key
      # - GATE_TLS_BIND_ADDRESS=0.0.0.0:5504
      # - GATE_TLS_ONLY=false
    # shm_size: 1g【不可删除】，docker默认为64M较小，需要增加才能保证运行
    shm_size: 1g
    memswap_limit: -1
    mem_limit: 1g
    cpus: '1.0'
    restart: always
    ports:
      - 5505:5505/tcp             # dnf-gate-server http
      # - 5504:5504/tcp           # dnf-gate-server https（启用TLS后开放）
      - 7000-7001:7000-7001/tcp   # df_bridge_r, df_channel_r
      - 7000-7001:7000-7001/udp   # df_bridge_r, df_channel_r
      - 7100:7100/tcp             # df_relay_r
      - 7100:7100/udp             # df_relay_r
      - 10011:10011/tcp           # df_game_r[ch.11]
      - 11011:11011/udp           # df_game_r[ch.11]
      - 10052:10052/tcp           # df_game_r[ch.52]
      - 11052:11052/udp           # df_game_r[ch.52]
      - 2111-2113:2111-2113/udp   # df_stun_r
    volumes:
      - ./data:/data
      - ./log:/home/neople/game/log
