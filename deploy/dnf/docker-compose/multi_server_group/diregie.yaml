version: "2.3"

services:

  dnf-1:
    hostname: dnf-1
    image: llnut/dnf:debian13-server-qf1031-latest
    environment:
      - TZ=Asia/Shanghai
      - SERVER_GROUP=2
      # 仅开启11和52频道
      - OPEN_CHANNEL='11,52'
      # 手动指定对外IP
      - PUBLIC_IP=IP-2
      - MAIN_BRIDGE_IP=IP-1
      - MAIN_MYSQL_HOST=IP-1
      - MAIN_MYSQL_PORT=3001
      - MAIN_MYSQL_ROOT_PASSWORD=88888888
      # - MAIN_MYSQL_GAME_ALLOW_IP=%
      - MYSQL_HOST=IP-2
      # 远程mysql的端口号[这里以3002为例]
      - MYSQL_PORT=3002
      # 远程数据库root密码
      - DNF_DB_ROOT_PASSWORD=88888888
      # - MYSQL_GAME_ALLOW_IP=%
      # dnf-gate-server配置（auth连接主节点DB，端口无需对外暴露）
      - GATE_AES_KEY=a1b2c3d4e5f6789012345678901234567890abcdef0123456789abcdef012345
    # shm_size: 1g【不可删除】，docker默认为64M较小，需要增加才能保证运行
    shm_size: 1g
    memswap_limit: -1
    mem_limit: 1g
    cpus: '1.0'
    restart: always
    ports:
      - 7200:7200/tcp             # df_relay_r
      - 7200:7200/udp             # df_relay_r
      - 20011:20011/tcp           # df_game_r[ch.11]
      - 21011:21011/udp           # df_game_r[ch.11]
      - 20052:20052/tcp           # df_game_r[ch.52]
      - 21052:21052/udp           # df_game_r[ch.52]
      - 2211-2213:2211-2213/udp   # df_stun_r
    volumes:
      - ./data:/data
      - ./log:/home/neople/game/log
