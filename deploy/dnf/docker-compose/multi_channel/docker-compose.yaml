version: "2.3"

services:

  dnf-1:
    hostname: dnf-1
    image: llnut/dnf:debian13-qf1031-latest
    stop_grace_period: 30s
    environment:
      - TZ=Asia/Shanghai
      - SERVER_GROUP=3
      # 数据库root密码
      - DNF_DB_ROOT_PASSWORD=88888888
      # dnf-gate-server配置
      - GATE_AES_KEY=a1b2c3d4e5f6789012345678901234567890abcdef0123456789abcdef012345
      # TLS配置（可选，GATE_TLS_CERT_PATH与GATE_TLS_KEY_PATH同时设置时启用）
      # - GATE_TLS_CERT_PATH=/data/server.crt
      # - GATE_TLS_KEY_PATH=/data/server.key
      # - GATE_TLS_BIND_ADDRESS=0.0.0.0:5504
      # - GATE_TLS_ONLY=false
      # 手动指定对外IP
      - PUBLIC_IP=127.0.0.1
      # 仅开启11和52频道
      - OPEN_CHANNEL='1,6,7'
    # shm_size: 8g【不可删除】，docker默认为64M较小，需要增加才能保证运行
    shm_size: 8g
    memswap_limit: -1
    mem_limit: 1g
    cpus: '1.0'
    restart: always
    ports:
      - 2000:180/tcp              # supervisor web
      - 3000:4000/tcp             # mysql
      - 5505:5505/tcp             # dnf-gate-server http
      # - 5504:5504/tcp           # dnf-gate-server https（启用TLS后开放）
      - 7001:7001/tcp             # df_channel_r
      - 7001:7001/udp             # df_channel_r
      - 7300:7300/tcp             # df_relay_r
      - 7300:7300/udp             # df_relay_r
      - 30001:30001/tcp           # df_game_r[ch.01]
      - 31001:31001/udp           # df_game_r[ch.01]
      - 30006:30006/tcp           # df_game_r[ch.06]
      - 31006:31006/udp           # df_game_r[ch.06]
      - 30007:30007/tcp           # df_game_r[ch.07]
      - 31007:31007/udp           # df_game_r[ch.07]
      - 2311-2313:2311-2313/udp   # df_stun_r
    volumes:
      - ./data:/data
      - ./mysql:/var/lib/mysql
      - ./log:/home/neople/game/log
