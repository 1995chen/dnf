name: mirror-buildkit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Mirror buildkit image to ghcr.io
        # rolling tag用于默认拉取,日期tag作为不可变快照以便回滚
        run: |
          DATE=$(date +%Y%m%d)
          DST="ghcr.io/${{ github.repository_owner }}/buildkit"
          for i in 1 2 3; do
            if docker buildx imagetools create \
                --tag "${DST}:buildx-stable-1" \
                --tag "${DST}:buildx-stable-1-${DATE}" \
                moby/buildkit:buildx-stable-1; then
              exit 0
            fi
            echo "attempt $i failed, retrying in 30s..."
            sleep 30
          done
          exit 1
