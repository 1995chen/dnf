name: mirror-buildkit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/registry-login
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          ghcr-actor: ${{ github.actor }}

      - name: Mirror buildkit image to ghcr.io
        # The rolling tag serves the default pull. The dated tag is an immutable
        # snapshot for rollback. One create call writes both tags atomically, so
        # the rolling tag is never updated while the dated tag is still missing.
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d)
          CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DST="ghcr.io/${{ github.repository_owner }}/buildkit"

          for attempt in 1 2 3; do
            if docker buildx imagetools create \
                --annotation "index:org.opencontainers.image.created=${CREATED}" \
                --tag "${DST}:buildx-stable-1" \
                --tag "${DST}:buildx-stable-1-${DATE}" \
                moby/buildkit:buildx-stable-1; then
              exit 0
            fi
            echo "attempt ${attempt} failed, retrying in 30s..."
            sleep 30
          done
          exit 1
