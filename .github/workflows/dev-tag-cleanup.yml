name: dev-tag-cleanup

on:
  schedule:
    - cron: '0 6 * * 0'  # weekly, Sunday 06:00 UTC
  workflow_dispatch:
    inputs:
      retention_days:
        description: Days of dev commit tags to keep
        required: false
        default: 30
        type: number
      dry_run:
        description: List deletions without deleting tags
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_PATH: llnut/dnf

jobs:
  cleanup:
    name: Prune old dev commit tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Prune dev commit tags
        env:
          DRY_RUN: ${{ inputs.dry_run || false }}
          RETENTION_DAYS: ${{ inputs.retention_days || 30 }}
          GH_TOKEN: ${{ secrets.GHCR_DELETE_TOKEN }}
          QUAY_API_TOKEN: ${{ secrets.QUAY_API_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: ./.github/scripts/prune-dev-tags.sh
