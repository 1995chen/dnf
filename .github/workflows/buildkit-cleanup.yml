name: buildkit-cleanup

on:
  schedule:
    - cron: '0 5 * * 0'  # weekly, Sunday 05:00 UTC
  workflow_dispatch:
    inputs:
      keep_days:
        description: Days of dated buildkit snapshot tags to keep
        required: false
        default: 7
        type: number
      dry_run:
        description: List deletions without deleting tags
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: Prune buildkit mirror snapshot tags
    runs-on: ubuntu-latest
    steps:
      - name: Prune old buildkit snapshot versions
        env:
          GH_TOKEN: ${{ secrets.GHCR_DELETE_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          KEEP_DAYS: ${{ inputs.keep_days || 7 }}
          DRY_RUN: ${{ inputs.dry_run || false }}
        run: |
          set -euo pipefail

          PKG=buildkit
          ROLLING_TAG=buildx-stable-1

          is_true() {
            case "${1,,}" in
              1 | true | yes | y | on) return 0 ;;
              *) return 1 ;;
            esac
          }

          err=$(mktemp)
          if ! owner_type=$(gh api "/users/${OWNER}" --jq '.type' 2>"$err"); then
            echo "::error::failed to resolve owner type for ${OWNER}" >&2
            cat "$err" >&2
            exit 1
          fi
          owner_type=$(printf '%s' "$owner_type" | tr '[:upper:]' '[:lower:]')
          case "$owner_type" in
            user) base="/users/${OWNER}/packages/container/${PKG}" ;;
            organization) base="/orgs/${OWNER}/packages/container/${PKG}" ;;
            *) echo "::error::unknown owner type '${owner_type}'" >&2; exit 1 ;;
          esac

          if ! gh api "$base" >/dev/null 2>"$err"; then
            if grep -q 'HTTP 404' "$err"; then
              echo "package ${PKG} does not exist, nothing to clean"
              exit 0
            fi
            echo "::error::failed to look up package ${PKG}" >&2
            cat "$err" >&2
            exit 1
          fi
          rm -f "$err"

          versions=$(mktemp)
          verr=$(mktemp)
          if ! gh api --paginate "${base}/versions" \
            --jq '.[] | [.id, ((.metadata.container.tags // []) | join(","))] | @tsv' \
            > "$versions" 2>"$verr"; then
            echo "::error::failed to list versions for ${PKG}; enumeration may be incomplete, not pruning" >&2
            cat "$verr" >&2
            exit 1
          fi
          rm -f "$verr"

          now=$(date -u +%s)
          deleted=0
          kept=0
          failed=0
          while IFS=$'\t' read -r id tags; do
            [ -n "$id" ] || continue

            if [ -z "${tags:-}" ]; then
              echo "[untagged] keep id=${id}"
              kept=$((kept + 1))
              continue
            fi

            has_rolling=false
            has_unknown=false
            has_snapshot=false
            newest_ts=0
            IFS=',' read -ra tag_arr <<< "$tags"
            for tag in "${tag_arr[@]}"; do
              if [ "$tag" = "$ROLLING_TAG" ]; then
                has_rolling=true
              elif [[ "$tag" =~ ^buildx-stable-1-([0-9]{4})([0-9]{2})([0-9]{2})$ ]]; then
                has_snapshot=true
                d="${BASH_REMATCH[1]}-${BASH_REMATCH[2]}-${BASH_REMATCH[3]}"
                if ts=$(date -u -d "$d" +%s 2>/dev/null); then
                  [ "$ts" -gt "$newest_ts" ] && newest_ts=$ts
                else
                  has_unknown=true
                fi
              else
                has_unknown=true
              fi
            done

            if [ "$has_rolling" = true ] || [ "$has_unknown" = true ] || [ "$has_snapshot" = false ]; then
              echo "[keep] id=${id} tags=${tags}"
              kept=$((kept + 1))
              continue
            fi

            age=$(( (now - newest_ts) / 86400 ))
            if [ "$age" -le "$KEEP_DAYS" ]; then
              echo "[recent] keep id=${id} tags=${tags} age=${age}d"
              kept=$((kept + 1))
              continue
            fi

            if is_true "$DRY_RUN"; then
              echo "[dry-run] delete id=${id} tags=${tags} age=${age}d"
              continue
            fi

            echo "[stale] delete id=${id} tags=${tags} age=${age}d"
            if gh api --silent -X DELETE "${base}/versions/${id}"; then
              deleted=$((deleted + 1))
            else
              failed=$((failed + 1))
              echo "  delete failed for id=${id}"
            fi
          done < "$versions"

          echo "---"
          echo "deleted: ${deleted}"
          echo "kept:    ${kept}"
          echo "failed:  ${failed}"

          if [ "${failed}" -gt 0 ]; then
            echo "::error::${failed} delete operation(s) failed; rerun to retry"
            exit 1
          fi
