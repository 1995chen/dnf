name: buildkit-cleanup

on:
  schedule:
    - cron: '0 5 * * 0'  # weekly, Sunday 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: Prune buildkit mirror versions
    runs-on: ubuntu-latest
    steps:
      - name: Prune old buildkit mirror snapshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          PKG=buildkit
          ROLLING_TAG=buildx-stable-1
          SNAPSHOT_RE='^buildx-stable-1-[0-9]{8}$'
          KEEP_DAILY_SNAPSHOTS=7

          # Pick the API path based on whether the owner is a user or an organization.
          OWNER_TYPE=$(gh api "/repos/${REPO}" --jq '.owner.type' | tr '[:upper:]' '[:lower:]')
          case "$OWNER_TYPE" in
            user)         BASE="/users/${OWNER}/packages/container/${PKG}" ;;
            organization) BASE="/orgs/${OWNER}/packages/container/${PKG}"  ;;
            *) echo "unknown owner type: ${OWNER_TYPE}" >&2; exit 1 ;;
          esac

          # The package may not exist yet on a brand-new repo; nothing to clean.
          # Other lookup failures should fail the workflow so stale snapshots do
          # not accumulate silently.
          LOOKUP_ERR=$(mktemp)
          if ! gh api "$BASE" >/dev/null 2>"$LOOKUP_ERR"; then
            if grep -q "HTTP 404" "$LOOKUP_ERR"; then
              echo "package ${PKG} does not exist, nothing to clean"
              exit 0
            fi

            echo "::error::failed to look up package ${PKG}; not pruning mirror snapshots" >&2
            cat "$LOOKUP_ERR" >&2
            exit 1
          fi
          rm -f "$LOOKUP_ERR"

          # Each line: <created_at><tab><version_id><tab><tag1,tag2,...>;
          # empty tag list means an untagged version.
          VERSIONS=$(mktemp)
          gh api "${BASE}/versions" --paginate \
            --jq '.[] | [.created_at, .id, (.metadata.container.tags | join(","))] | @tsv' \
            > "$VERSIONS"

          KEEP_SNAPSHOT_IDS=$(mktemp)
          awk -F '\t' -v snapshot_re="$SNAPSHOT_RE" '
            {
              split($3, tags, ",")
              for (i in tags) {
                if (tags[i] ~ snapshot_re) {
                  print tags[i] "\t" $2
                }
              }
            }
          ' "$VERSIONS" \
            | sort -r \
            | awk -F '\t' '!seen[$2]++ { print $2 }' \
            | head -n "$KEEP_DAILY_SNAPSHOTS" \
            > "$KEEP_SNAPSHOT_IDS"

          echo "snapshot version ids to keep:"
          cat "$KEEP_SNAPSHOT_IDS"
          echo "---"

          DELETED=0
          KEPT=0
          FAILED=0
          while IFS=$'\t' read -r CREATED_AT ID TAGS; do
            if [ -z "${TAGS:-}" ]; then
              echo "[untagged] DELETE id=${ID} created_at=${CREATED_AT}"
              if gh api --silent -X DELETE "${BASE}/versions/${ID}"; then
                DELETED=$((DELETED+1))
              else
                FAILED=$((FAILED+1))
                echo "  delete failed for id=${ID}"
              fi
              continue
            fi

            KEEP_THIS=false
            HAS_SNAPSHOT=false
            HAS_UNKNOWN=false
            IFS=',' read -ra TAG_ARR <<< "$TAGS"
            for TAG in "${TAG_ARR[@]}"; do
              if [ "$TAG" = "$ROLLING_TAG" ]; then
                KEEP_THIS=true
              elif [[ "$TAG" =~ ^buildx-stable-1-[0-9]{8}$ ]]; then
                HAS_SNAPSHOT=true
              else
                HAS_UNKNOWN=true
              fi
            done

            if [ "$KEEP_THIS" = true ]; then
              echo "[rolling] KEEP id=${ID} tags=${TAGS}"
              KEPT=$((KEPT+1))
            elif [ "$HAS_SNAPSHOT" = true ] && grep -qFx "$ID" "$KEEP_SNAPSHOT_IDS"; then
              echo "[recent-snapshot] KEEP id=${ID} tags=${TAGS}"
              KEPT=$((KEPT+1))
            elif [ "$HAS_SNAPSHOT" = true ] && [ "$HAS_UNKNOWN" = false ]; then
              echo "[stale-snapshot] DELETE id=${ID} tags=${TAGS}"
              if gh api --silent -X DELETE "${BASE}/versions/${ID}"; then
                DELETED=$((DELETED+1))
              else
                FAILED=$((FAILED+1))
                echo "  delete failed for id=${ID}"
              fi
            else
              echo "[unknown-tag] KEEP id=${ID} tags=${TAGS}"
              KEPT=$((KEPT+1))
            fi
          done < "$VERSIONS"

          echo "---"
          echo "deleted: ${DELETED}"
          echo "kept:    ${KEPT}"
          echo "failed:  ${FAILED}"

          # Surface transient API failures in the Actions UI so they don't accumulate silently.
          if [ "${FAILED}" -gt 0 ]; then
            echo "::error::${FAILED} delete operation(s) failed; rerun to retry"
            exit 1
          fi
