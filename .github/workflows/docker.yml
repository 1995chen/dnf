name: ci

on:
  push:
    branches: [ "master", "main" ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tag to build'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.tags || '' }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read
  packages: write

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  IMAGE_PATH: llnut/dnf

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag_suffix: ${{ steps.meta.outputs.tag_suffix }}
      latest_suffix: ${{ steps.meta.outputs.latest_suffix }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      cache_slug: ${{ steps.meta.outputs.cache_slug }}
      cache_fallback_slug: ${{ steps.meta.outputs.cache_fallback_slug }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Compute build metadata
        id: meta
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DISPATCH_TAGS: ${{ github.event.inputs.tags }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # shellcheck source=.github/scripts/cache-slug.sh
          . .github/scripts/cache-slug.sh

          CHECKOUT_REF=""
          if [ "$EVENT_NAME" = "release" ]; then
            TAG_SUFFIX="${RELEASE_TAG#Release-}"
            LATEST_SUFFIX="latest"
            CHECKOUT_REF="$RELEASE_TAG"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_TAGS" ]; then
            case "$DISPATCH_TAGS" in
              Release-*) ;;
              *) echo "::error::workflow_dispatch input 'tags' must start with 'Release-' (got '$DISPATCH_TAGS')" >&2; exit 1 ;;
            esac
            TAG_SUFFIX="${DISPATCH_TAGS#Release-}"
            LATEST_SUFFIX="latest"
            CHECKOUT_REF="$DISPATCH_TAGS"
          else
            SHORT_SHA="${SHA:0:7}"
            TAG_SUFFIX="dev-${SHORT_SHA}"
            LATEST_SUFFIX="dev-latest"
          fi

          CACHE_REF="${CHECKOUT_REF:-$REF_NAME}"
          CACHE_SLUG=$(sanitize_slug "$CACHE_REF")
          CACHE_FALLBACK_SLUG=$(sanitize_slug "${DEFAULT_BRANCH:-main}")

          {
            echo "tag_suffix=${TAG_SUFFIX}"
            echo "latest_suffix=${LATEST_SUFFIX}"
            echo "checkout_ref=${CHECKOUT_REF}"
            echo "cache_slug=${CACHE_SLUG}"
            echo "cache_fallback_slug=${CACHE_FALLBACK_SLUG}"
          } >> "$GITHUB_OUTPUT"

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install test dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y socat
          S6_OVERLAY_VERSION=3.2.3.0
          sudo mkdir -p /opt/s6
          curl -fsSL "https://github.com/just-containers/s6-overlay/releases/download/v${S6_OVERLAY_VERSION}/s6-overlay-x86_64.tar.xz" \
            | sudo tar -C /opt/s6 -Jx
          echo /opt/s6/command >> "$GITHUB_PATH"
      - name: Run unified shell test suite
        run: bash .github/scripts/run-shell-tests.sh

  ensure-buildkit-mirror:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure buildkit mirror
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/buildkit:buildx-stable-1"
          for attempt in 1 2 3; do
            if docker buildx imagetools create --tag "$IMAGE" moby/buildkit:buildx-stable-1; then
              exit 0
            fi
            echo "attempt ${attempt} failed, retrying in 30s..."
            sleep 30
          done
          exit 1

  build-pipeline:
    needs: [metadata, ensure-buildkit-mirror, tests]
    name: build-${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [debian13, ubuntu26, alma9, centos7]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          path: ci

      - uses: actions/checkout@v6.0.2
        with:
          path: src
          ref: ${{ needs.metadata.outputs.checkout_ref }}

      - uses: ./ci/.github/actions/registry-login
        with:
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          ghcr-actor: ${{ github.actor }}
          quay-username: ${{ secrets.QUAY_USERNAME }}
          quay-token: ${{ secrets.QUAY_TOKEN }}
          acr-registry: ${{ env.ACR_REGISTRY }}
          acr-username: ${{ secrets.ACR_USERNAME }}
          acr-password: ${{ secrets.ACR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4.0.0
        with:
          driver-opts: image=ghcr.io/${{ github.repository_owner }}/buildkit:buildx-stable-1

      - name: Compute tags
        id: tags
        env:
          TAG_SUFFIX: ${{ needs.metadata.outputs.tag_suffix }}
          LATEST_SUFFIX: ${{ needs.metadata.outputs.latest_suffix }}
        run: |
          set -euo pipefail
          BASE_TAG="${{ matrix.os }}-base-${TAG_SUFFIX}"
          BASE_LATEST="${{ matrix.os }}-base-${LATEST_SUFFIX}"
          DB_TAG="${{ matrix.os }}-db-${TAG_SUFFIX}"
          DB_LATEST="${{ matrix.os }}-db-${LATEST_SUFFIX}"
          SERVER_TAG="${{ matrix.os }}-server-qf1031-${TAG_SUFFIX}"
          SERVER_LATEST="${{ matrix.os }}-server-qf1031-${LATEST_SUFFIX}"
          FULL_TAG="${{ matrix.os }}-qf1031-${TAG_SUFFIX}"
          FULL_LATEST="${{ matrix.os }}-qf1031-${LATEST_SUFFIX}"
          FULL_ALIAS="${{ matrix.os }}-full-qf1031-${TAG_SUFFIX}"
          FULL_ALIAS_LATEST="${{ matrix.os }}-full-qf1031-${LATEST_SUFFIX}"
          REGISTRIES=("${IMAGE_PATH}" "ghcr.io/${IMAGE_PATH}" "quay.io/${IMAGE_PATH}")

          if [ -n "$ACR_REGISTRY" ] && [ "$LATEST_SUFFIX" != "dev-latest" ]; then
            REGISTRIES+=("${ACR_REGISTRY}/${IMAGE_PATH}")
          fi

          BASE_TAGS=""
          DB_TAGS=""
          SERVER_TAGS=""
          FULL_TAGS=""
          for REG in "${REGISTRIES[@]}"; do
            BASE_TAGS="${BASE_TAGS}${REG}:${BASE_TAG},"
            DB_TAGS="${DB_TAGS}${REG}:${DB_TAG},"
            SERVER_TAGS="${SERVER_TAGS}${REG}:${SERVER_TAG},"
            FULL_TAGS="${FULL_TAGS}${REG}:${FULL_TAG},"
          done

          {
            echo "base_tags=${BASE_TAGS%,}"
            echo "base_primary=${BASE_TAG}"
            echo "base_latest=${BASE_LATEST}"
            echo "db_tags=${DB_TAGS%,}"
            echo "db_primary=${DB_TAG}"
            echo "db_latest=${DB_LATEST}"
            echo "server_tags=${SERVER_TAGS%,}"
            echo "server_primary=${SERVER_TAG}"
            echo "server_latest=${SERVER_LATEST}"
            echo "full_tags=${FULL_TAGS%,}"
            echo "full_primary=${FULL_TAG}"
            echo "full_latest=${FULL_LATEST}"
            echo "full_alias=${FULL_ALIAS}"
            echo "full_alias_latest=${FULL_ALIAS_LATEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push base
        uses: docker/bake-action@v7.1.0
        env:
          BASE_TAGS_CSV: ${{ steps.tags.outputs.base_tags }}
          CACHE_FALLBACK_SLUG: ${{ needs.metadata.outputs.cache_fallback_slug }}
          CACHE_REPO: ghcr.io/${{ github.repository_owner }}/dnf-cache
          CACHE_SLUG: ${{ needs.metadata.outputs.cache_slug }}
          OS: ${{ matrix.os }}
        with:
          files: ../ci/.github/bake/docker-bake.hcl
          source: src
          targets: base
          push: true

      - name: Tag base latest alias
        env:
          LATEST: ${{ steps.tags.outputs.base_latest }}
          PRIMARY: ${{ steps.tags.outputs.base_primary }}
          LATEST_SUFFIX: ${{ needs.metadata.outputs.latest_suffix }}
        run: |
          set -euo pipefail
          REGISTRIES=("${IMAGE_PATH}" "ghcr.io/${IMAGE_PATH}" "quay.io/${IMAGE_PATH}")
          if [ -n "$ACR_REGISTRY" ] && [ "$LATEST_SUFFIX" != "dev-latest" ]; then
            REGISTRIES+=("${ACR_REGISTRY}/${IMAGE_PATH}")
          fi

          for REG in "${REGISTRIES[@]}"; do
            docker buildx imagetools create --tag "${REG}:${LATEST}" "${REG}:${PRIMARY}"
          done

      - name: Build and push db + server via bake
        uses: docker/bake-action@v7.1.0
        env:
          BASE_TAG: ${{ steps.tags.outputs.base_primary }}
          CACHE_FALLBACK_SLUG: ${{ needs.metadata.outputs.cache_fallback_slug }}
          CACHE_REPO: ghcr.io/${{ github.repository_owner }}/dnf-cache
          CACHE_SLUG: ${{ needs.metadata.outputs.cache_slug }}
          DB_TAGS_CSV: ${{ steps.tags.outputs.db_tags }}
          OS: ${{ matrix.os }}
          SERVER_TAGS_CSV: ${{ steps.tags.outputs.server_tags }}
        with:
          files: ../ci/.github/bake/docker-bake.hcl
          source: src
          targets: middle
          push: true

      - name: Tag db + server latest aliases
        env:
          DB_LATEST: ${{ steps.tags.outputs.db_latest }}
          DB_PRIMARY: ${{ steps.tags.outputs.db_primary }}
          SERVER_LATEST: ${{ steps.tags.outputs.server_latest }}
          SERVER_PRIMARY: ${{ steps.tags.outputs.server_primary }}
          LATEST_SUFFIX: ${{ needs.metadata.outputs.latest_suffix }}
        run: |
          set -euo pipefail
          REGISTRIES=("${IMAGE_PATH}" "ghcr.io/${IMAGE_PATH}" "quay.io/${IMAGE_PATH}")
          if [ -n "$ACR_REGISTRY" ] && [ "$LATEST_SUFFIX" != "dev-latest" ]; then
            REGISTRIES+=("${ACR_REGISTRY}/${IMAGE_PATH}")
          fi

          for REG in "${REGISTRIES[@]}"; do
            docker buildx imagetools create --tag "${REG}:${DB_LATEST}" "${REG}:${DB_PRIMARY}"
            docker buildx imagetools create --tag "${REG}:${SERVER_LATEST}" "${REG}:${SERVER_PRIMARY}"
          done

      - name: Build and push full
        uses: docker/bake-action@v7.1.0
        env:
          CACHE_FALLBACK_SLUG: ${{ needs.metadata.outputs.cache_fallback_slug }}
          CACHE_REPO: ghcr.io/${{ github.repository_owner }}/dnf-cache
          CACHE_SLUG: ${{ needs.metadata.outputs.cache_slug }}
          DB_TAG: ${{ steps.tags.outputs.db_primary }}
          FULL_TAGS_CSV: ${{ steps.tags.outputs.full_tags }}
          OS: ${{ matrix.os }}
        with:
          files: ../ci/.github/bake/docker-bake.hcl
          source: src
          targets: full
          push: true

      - name: Tag full aliases and latest
        env:
          ALIAS: ${{ steps.tags.outputs.full_alias }}
          ALIAS_LATEST: ${{ steps.tags.outputs.full_alias_latest }}
          LATEST: ${{ steps.tags.outputs.full_latest }}
          PRIMARY: ${{ steps.tags.outputs.full_primary }}
          LATEST_SUFFIX: ${{ needs.metadata.outputs.latest_suffix }}
        run: |
          set -euo pipefail
          REGISTRIES=("${IMAGE_PATH}" "ghcr.io/${IMAGE_PATH}" "quay.io/${IMAGE_PATH}")
          if [ -n "$ACR_REGISTRY" ] && [ "$LATEST_SUFFIX" != "dev-latest" ]; then
            REGISTRIES+=("${ACR_REGISTRY}/${IMAGE_PATH}")
          fi

          for REG in "${REGISTRIES[@]}"; do
            docker buildx imagetools create --tag "${REG}:${LATEST}" "${REG}:${PRIMARY}"
            docker buildx imagetools create --tag "${REG}:${ALIAS}" "${REG}:${PRIMARY}"
            docker buildx imagetools create --tag "${REG}:${ALIAS_LATEST}" "${REG}:${PRIMARY}"
          done
