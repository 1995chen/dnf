# 服务端启动依赖配置
#
# 格式:
#   program | deps | probes
# deps 为逗号分隔的supervisor program，为空表示不依赖其他supervisor program`
# probes 为分号分隔的服务就绪条件，为空表示启动即为就绪状态
#
# probes 可选类型:
#   file:<path>
#   tcp:<host>:<port>
#   udp:<host>:<port>
#   logmark:<file>:<regex> 文件中必须包含指定关键词
#   cmd:<shell> bash命令成功执行
#
# 语法限制:
# program 和 deps 中不能包含 "|"
# cmd中不能包含 ";"，若需要";"，需要用单独的脚本来封装

main_mysql_proxy | |
sg_mysql_proxy | |
daily_job | sg_mysql_proxy |
monitor_ip | | file:/data/monitor_ip/MONITOR_PUBLIC_IP
stun | | file:/home/neople/stun/pid/*.pid
monitor | dbmw_mnt | file:/home/neople/monitor/pid/*.pid
manager | | file:/home/neople/manager/pid/*.pid
relay | | file:/home/neople/relay/pid/*.pid
bridge | | cmd:/home/template/init/lib/probe-port.sh /home/neople/bridge/cfg/server.cfg $MAIN_BRIDGE_IP
channel | bridge,monitor_ip | cmd:/home/template/init/lib/probe-port.sh /home/neople/channel/cfg/server.cfg
dbmw_guild | main_mysql_proxy | file:/home/neople/dbmw_guild/pid/*.pid
dbmw_mnt | main_mysql_proxy | file:/home/neople/dbmw_mnt/pid/*.pid
dbmw_stat | main_mysql_proxy | file:/home/neople/dbmw_stat/pid/*.pid
auction | sg_mysql_proxy | file:/home/neople/auction/pid/*.pid
point | | file:/home/neople/point/pid/*.pid
guild | dbmw_guild | file:/home/neople/guild/pid/*.pid
statics | dbmw_stat | file:/home/neople/statics/pid/*.pid
coserver | | file:/home/neople/coserver/pid/*.pid
community | | file:/home/neople/community/pid/*.pid
gunnersvr | | file:/home/neople/secsvr/gunnersvr/*.pid
zergsvr | | file:/home/neople/secsvr/zergsvr/zergsvr.pid
zergsvr_secagent | zergsvr | file:/home/neople/secsvr/zergsvr/secagent.pid;cmd:/home/template/init/lib/probe-secbus.sh
game_* | bridge,monitor_ip,zergsvr_secagent | cmd:test -s /home/neople/game/pid/"${PROGRAM#game_}".pid
llnut_gate | monitor_ip |
netbird | |
tailscaled | |
tailscale | tailscaled |
